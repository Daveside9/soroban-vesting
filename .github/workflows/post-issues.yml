name: Post Issues to GitHub

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'ISSUES_TO_POST.txt'

jobs:
  post-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run post-issues script
        env:
          GITHUB_TOKEN: ${{ secrets.ISSUES_PAT }}
        run: node scripts/post-issues.js
